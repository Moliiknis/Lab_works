<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google</title>
<style>
  html, body { height: 100%; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; font-size: 14px; }
  body { display: flex; flex-direction: column; }
  table.main-layout { width: 100%; height: 100%; border-collapse: collapse; table-layout: fixed; }
  td.header-row { height: 60px; vertical-align: middle; }
  td.content-row { height: 100%; vertical-align: middle; text-align: center; }
  td.footer-row { height: 46px; vertical-align: middle; }

  /* Header */
  .header-table { float: right; margin-right: 20px; }
  .header-table td { padding: 5px 8px; vertical-align: middle; }
  .header-link { color: #222; text-decoration: none; font-size: 13px; }
  .header-link:hover { text-decoration: underline; }
  .header-link:visited { color: #222; }
  .signin-btn { background: #4285f4; color: #fff; border: none; padding: 8px 24px; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; display: inline-block; text-decoration: none; }
  .signin-btn:hover { box-shadow: 0 1px 3px rgba(66,133,244,.3); }

  /* Logo */
  .logo-table { margin: 0 auto 18px auto; border-collapse: collapse; }
  .logo-table td { font-size: 72px; font-weight: bold; letter-spacing: -4px; line-height: 1; }
  .google-blue { color: #4285f4; }
  .google-red { color: #ea4335; }
  .google-yellow { color: #fbbc05; }
  .google-green { color: #34a853; }

  /* Search */
  .search-table { margin: 0 auto; border-collapse: collapse; }
  .search-bar { width: 560px; height: 44px; border: 1px solid #dfe1e5; border-radius: 24px; padding: 0 20px; font-size: 16px; outline: none; box-sizing: border-box; }
  .search-bar:hover { box-shadow: 0 1px 6px rgba(32,33,36,.28); border-color: rgba(223,225,229,0); }
  .search-bar:focus { box-shadow: 0 1px 6px rgba(32,33,36,.28); border-color: rgba(223,225,229,0); }
  .buttons-table { margin: 26px auto 0 auto; border-collapse: collapse; }
  .buttons-table td { padding: 0 6px; }
  .search-btn { background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; color: #3c4043; font-size: 14px; padding: 10px 20px; cursor: pointer; }
  .search-btn:hover { box-shadow: 0 1px 1px rgba(0,0,0,.1); background: #f8f9fa; border: 1px solid #dadce0; color: #202124; }

  /* Footer */
  .footer-bg { background: #f2f2f2; }
  .footer-table { width: 100%; border-collapse: collapse; }
  .footer-table td { padding: 11px 16px; font-size: 14px; color: #6f6f6f; border-top: 1px solid #dadce0; }
  .footer-left { text-align: left; }
  .footer-right { text-align: right; }
  .footer-link { color: #6f6f6f; text-decoration: none; padding: 0 8px; white-space: nowrap; }
  .footer-link:hover { text-decoration: underline; }
  .footer-link:first-child { padding-left: 0; }
  .footer-link:last-child { padding-right: 0; }
</style>
</head>
<body>

<table class="main-layout">
  <tr>
    <td class="header-row">
      <table class="header-table">
        <tr>
          <td><a class="header-link" href="#">Gmail</a></td>
          <td><a class="header-link" href="#">Images</a></td>
          <td><a class="signin-btn" href="#">Sign in</a></td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <td class="content-row">
      <table class="logo-table">
        <tr>
          <td class="google-blue">G</td>
          <td class="google-red">o</td>
          <td class="google-yellow">o</td>
          <td class="google-blue">g</td>
          <td class="google-green">l</td>
          <td class="google-red">e</td>
        </tr>
      </table>

      <form action="https://www.google.com/search" method="get">
        <table class="search-table">
          <tr>
            <td><input class="search-bar" type="text" name="q" placeholder="Search Google or type a URL"></td>
          </tr>
        </table>

        <table class="buttons-table">
          <tr>
            <td><input class="search-btn" type="submit" value="Google Search"></td>
            <td><input class="search-btn" type="button" value="I'm Feeling Lucky"></td>
          </tr>
        </table>
      </form>
    </td>
  </tr>

  <tr>
    <td class="footer-row footer-bg">
      <table class="footer-table">
        <tr>
          <td class="footer-left">
            <a class="footer-link" href="#">Advertising</a>
            <a class="footer-link" href="#">Business</a>
            <a class="footer-link" href="#">How Search works</a>
          </td>
          <td class="footer-right">
            <a class="footer-link" href="#">Settings</a>
            <a class="footer-link" href="#">Terms</a>
            <a class="footer-link" href="#">Privacy</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

</body>
</html>
