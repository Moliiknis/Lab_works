<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chessboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#312e2b;font-family:system-ui,sans-serif;padding:20px}h1{color:#eee;margin-bottom:20px;font-weight:500;font-size:1.5rem}#board{display:grid;grid-template-columns:32px repeat(8,1fr);grid-template-rows:repeat(8,1fr) 32px;width:100%;max-width:520px;aspect-ratio:1/1;border:4px solid #1a1a1a;border-radius:4px;background:#1a1a1a;gap:0;user-select:none}.label{display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.8rem;color:#b8b8b8;background:#1a1a1a}.rank-label{grid-column:1}.file-label{grid-row:9}.square{display:flex;align-items:center;justify-content:center}.square.light{background:#f0d9b5}.square.dark{background:#b58863}.piece{font-size:clamp(22px,5vw,44px);line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.3)}@media(max-width:480px){#board{max-width:100%;grid-template-columns:24px repeat(8,1fr);grid-template-rows:repeat(8,1fr) 24px}.label{font-size:.65rem}}
</style>
</head>
<body>
<h1>♚ Chessboard</h1>
<div id="board">
<div class="label rank-label" style="grid-row:1">8</div>
<div class="label rank-label" style="grid-row:2">7</div>
<div class="label rank-label" style="grid-row:3">6</div>
<div class="label rank-label" style="grid-row:4">5</div>
<div class="label rank-label" style="grid-row:5">4</div>
<div class="label rank-label" style="grid-row:6">3</div>
<div class="label rank-label" style="grid-row:7">2</div>
<div class="label rank-label" style="grid-row:8">1</div>

<div class="square light"><span class="piece">♜</span></div>
<div class="square dark"></div>
<div class="square light"><span class="piece">♝</span></div>
<div class="square dark"></div>
<div class="square light"><span class="piece">♚</span></div>
<div class="square dark"><span class="piece">♝</span></div>
<div class="square light"></div>
<div class="square dark"><span class="piece">♜</span></div>

<div class="square dark"><span class="piece">♟</span></div>
<div class="square light"><span class="piece">♟</span></div>
<div class="square dark"><span class="piece">♟</span></div>
<div class="square light"></div>
<div class="square dark"></div>
<div class="square light"><span class="piece">♟</span></div>
<div class="square dark"><span class="piece">♟</span></div>
<div class="square light"><span class="piece">♟</span></div>

<div class="square light"></div>
<div class="square dark"></div>
<div class="square light"></div>
<div class="square dark"></div>
<div class="square light"><span class="piece">♟</span></div>
<div class="square dark"></div>
<div class="square light"></div>
<div class="square dark"></div>

<div class="square dark"></div>
<div class="square light"></div>
<div class="square dark"><span class="piece">♙</span></div>
<div class="square light"></div>
<div class="square dark"><span class="piece">♛</span></div>
<div class="square light"></div>
<div class="square dark"><span class="piece">♙</span></div>
<div class="square light"></div>

<div class="square light"></div>
<div class="square dark"><span class="piece">♙</span></div>
<div class="square light"></div>
<div class="square dark"><span class="piece">♟</span></div>
<div class="square light"></div>
<div class="square dark"><span class="piece">♙</span></div>
<div class="square light"></div>
<div class="square dark"><span class="piece">♙</span></div>

<div class="square dark"></div>
<div class="square light"></div>
<div class="square dark"><span class="piece">♘</span></div>
<div class="square light"></div>
<div class="square dark"><span class="piece">♗</span></div>
<div class="square light"></div>
<div class="square dark"></div>
<div class="square light"></div>

<div class="square light"><span class="piece">♙</span></div>
<div class="square dark"></div>
<div class="square light"><span class="piece">♗</span></div>
<div class="square dark"><span class="piece">♙</span></div>
<div class="square light"><span class="piece">♙</span></div>
<div class="square dark"></div>
<div class="square light"><span class="piece">♙</span></div>
<div class="square dark"></div>

<div class="square dark"><span class="piece">♖</span></div>
<div class="square light"><span class="piece">♘</span></div>
<div class="square dark"></div>
<div class="square light"><span class="piece">♕</span></div>
<div class="square dark"><span class="piece">♔</span></div>
<div class="square light"></div>
<div class="square dark"></div>
<div class="square light"><span class="piece">♖</span></div>

<div class="label file-label" style="grid-row:9;grid-column:2">A</div>
<div class="label file-label" style="grid-row:9;grid-column:3">B</div>
<div class="label file-label" style="grid-row:9;grid-column:4">C</div>
<div class="label file-label" style="grid-row:9;grid-column:5">D</div>
<div class="label file-label" style="grid-row:9;grid-column:6">E</div>
<div class="label file-label" style="grid-row:9;grid-column:7">F</div>
<div class="label file-label" style="grid-row:9;grid-column:8">G</div>
<div class="label file-label" style="grid-row:9;grid-column:9">H</div>
</div>
</body>
</html>
